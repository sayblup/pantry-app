<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiżarnia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>SPIŻARNIA</h1>
        <button id="refreshBtn" class="btn-refresh">Odśwież</button>
    </header>

    <nav class="tab-nav">
        <button class="tab-btn active" data-tab="pantry">🏠 Spiżarnia</button>
        <button class="tab-btn" data-tab="recipes">📋 Przepisy</button>
        <button class="tab-btn" data-tab="shopping">🛒 Lista zakupów</button>
        <button class="tab-btn" data-tab="spoonacular">🌐 Przepisy innych</button>
        <button class="tab-btn" data-tab="depleted">❌ Skończyło się</button>
    </nav>

    <main>
        <!-- SPIŻARNIA -->
        <section id="tab-pantry" class="tab-content active">
            <div class="section-header">
                <h2>Spiżarnia</h2>
                <button id="addIngredientBtn" class="btn-primary">+ Dodaj produkt</button>
            </div>
            <div class="search-row">
                <input type="text" id="pantrySearch" placeholder="Wyszukaj produkt...">
                <select id="pantryFilterCategory">
                    <option value="">Wszystkie kategorie</option>
                </select>
            </div>
            <div id="pantryList"></div>
        </section>

        <!-- PRZEPISY -->
        <section id="tab-recipes" class="tab-content">
            <div class="section-header">
                <h2>Przepisy</h2>
                <button id="addRecipeBtn" class="btn-primary">+ Dodaj przepis</button>
            </div>
            <input type="text" id="recipeSearch" placeholder="Wyszukaj przepis...">
            <div id="recipesList"></div>
        </section>

        <!-- LISTA ZAKUPÓW -->
        <section id="tab-shopping" class="tab-content">
            <div class="section-header">
                <h2>Lista zakupów</h2>
                <button id="addShoppingItemBtn" class="btn-primary">+ Dodaj pozycję</button>
            </div>
            <div class="shopping-actions">
                <button id="moveToPantryBtn" class="btn-action-green">✓ Dodaj zaznaczone do spiżarni</button>
                <button id="deleteCheckedBtn" class="btn-action-red">✕ Usuń zaznaczone</button>
            </div>
            <div id="shoppingList"></div>
        </section>

        <!-- SPOONACULAR -->
        <section id="tab-spoonacular" class="tab-content">
            <div class="section-header">
                <h2>Przepisy innych</h2>
            </div>
            <div class="spoonacular-search-row">
                <input type="text" id="spoonacularSearch" placeholder="Wyszukaj przepis (po angielsku)...">
                <button id="spoonacularSearchBtn" class="btn-primary">Szukaj</button>
            </div>
            <div id="spoonacularResults"></div>
        </section>

        <!-- SKOŃCZYŁO SIĘ -->
        <section id="tab-depleted" class="tab-content">
            <h2>Skończyło się</h2>
            <div id="depletedList"></div>
        </section>
    </main>

    <!-- MODAL: Dodaj produkt -->
    <div id="addModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Dodaj produkt</h3>
            <form id="addIngredientForm">
                <label>Nazwa produktu</label>
                <input type="text" id="ingredientName" required>
                <label>Kategoria</label>
                <select id="ingredientCategory" class="category-select"></select>
                <label>Ilość</label>
                <input type="number" id="ingredientQuantity" step="0.01" required>
                <label>Jednostka</label>
                <select id="ingredientUnit" class="unit-select"></select>
                <button type="submit" class="btn-primary">Dodaj</button>
            </form>
        </div>
    </div>

    <!-- MODAL: Szczegóły / opis produktu -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3 id="detailModalTitle"></h3>
            <form id="detailIngredientForm">
                <input type="hidden" id="detailIngredientId">
                <label>Kategoria</label>
                <select id="detailIngredientCategory" class="category-select"></select>
                <label>Ilość</label>
                <input type="number" id="detailIngredientQuantity" step="0.01" required>
                <label>Jednostka</label>
                <select id="detailIngredientUnit" class="unit-select"></select>
                <label>Opis / notatki</label>
                <textarea id="detailIngredientDescription" rows="4" placeholder="Np. przechowywać w lodówce, ulubiona marka..."></textarea>
                <button type="submit" class="btn-primary">Zapisz</button>
            </form>
        </div>
    </div>

    <!-- MODAL: Przywróć ze skończonych -->
    <div id="restoreModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Przywróć do spiżarni</h3>
            <form id="restoreIngredientForm">
                <input type="hidden" id="restoreIngredientId">
                <p id="restoreIngredientName" class="restore-name"></p>
                <label>Ilość</label>
                <input type="number" id="restoreIngredientQuantity" step="0.01" required>
                <label>Jednostka</label>
                <select id="restoreIngredientUnit" class="unit-select"></select>
                <button type="submit" class="btn-primary">Przywróć</button>
            </form>
        </div>
    </div>

    <!-- MODAL: Dodaj przepis -->
    <div id="addRecipeModal" class="modal">
        <div class="modal-content modal-wide">
            <span class="close">&times;</span>
            <h3>Dodaj przepis</h3>
            <form id="addRecipeForm">
                <label>Nazwa przepisu</label>
                <input type="text" id="recipeName" required>
                <label>Składniki</label>
                <div id="recipeIngredientsContainer"></div>
                <button type="button" id="addRecipeIngredientBtn" class="btn-add-row">+ Dodaj składnik</button>
                <button type="submit" class="btn-primary">Zapisz przepis</button>
            </form>
        </div>
    </div>

    <!-- MODAL: Dodaj do listy zakupów -->
    <div id="addShoppingModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Dodaj do listy zakupów</h3>
            <form id="addShoppingItemForm">
                <label>Nazwa produktu</label>
                <input type="text" id="shoppingItemName" required>
                <label>Kategoria</label>
                <select id="shoppingItemCategory" class="category-select"></select>
                <label>Ilość</label>
                <input type="number" id="shoppingItemQuantity" step="0.01" required>
                <label>Jednostka</label>
                <select id="shoppingItemUnit" class="unit-select"></select>
                <button type="submit" class="btn-primary">Dodaj</button>
            </form>
        </div>
    </div>

    <!-- MODAL: Podgląd przepisu Spoonacular -->
    <div id="spoonacularDetailModal" class="modal">
        <div class="modal-content modal-wide">
            <span class="close">&times;</span>
            <h3 id="spoonacularDetailTitle"></h3>
            <div id="spoonacularDetailContent"></div>
            <button id="importSpoonacularBtn" class="btn-primary" style="margin-top:15px;">Importuj do moich przepisów</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
